name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  runtime:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate Skill structure
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path("SKILL.md").read_text(encoding="utf-8")
          assert text.startswith("---\n")
          assert "name: token-firewall-team" in text.split("---", 2)[1]
          assert "description:" in text.split("---", 2)[1]
          PY
      - name: Run Runtime tests
        env:
          PYTHONPATH: scripts/token_firewall_runtime
        run: python -m unittest discover -s tests/token_firewall -v
      - name: Check CLI entry point
        run: python scripts/token_firewall.py --help >/dev/null
